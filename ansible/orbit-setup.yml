---
# ═══════════════════════════════════════════════
# METODO ORBIT — Playbook di Setup Completo
# Uso: ansible-playbook orbit-setup.yml -i inventory/hosts.yml
# Tempo: ~20 minuti su Raspberry Pi 4
# ═══════════════════════════════════════════════

- name: Metodo ORBIT — Setup Raspberry Pi
  hosts: orbit_pi
  become: true
  become_method: sudo

  vars_prompt:
    - name: openrouter_api_key
      prompt: "OpenRouter API Key"
      private: true
    - name: telegram_bot_token
      prompt: "Telegram Bot Token"
      private: true
    - name: telegram_allowed_users
      prompt: "Telegram User ID (il tuo)"
      private: false
    - name: github_token
      prompt: "GitHub Personal Access Token"
      private: true
    - name: brevo_mcp_token
      prompt: "Brevo MCP Token"
      private: true
    - name: elevenlabs_api_key
      prompt: "ElevenLabs API Key"
      private: true
    - name: n8n_mcp_url
      prompt: "n8n MCP URL (es. https://n8n.crigamo3.com/mcp-server/http)"
      private: false
    - name: n8n_api_key
      prompt: "n8n MCP API Key"
      private: true
    - name: composio_api_key
      prompt: "Composio API Key"
      private: true
    - name: tailscale_authkey
      prompt: "Tailscale Auth Key (da tailscale.com/settings/keys)"
      private: true

  roles:
    - base          # sistema base, dipendenze, locale
    - firewall      # ufw, fail2ban, sicurezza
    - hermes        # HERMES Agent + configurazione
    - gh-cli        # GitHub CLI
    - mcp-servers   # github, brevo, elevenlabs, n8n, composio
    - hermes-profiles  # copywriter-snep, copywriter-diamrent, workhunter, orbit-author
    - hermes-wiki   # struttura wiki + content directories
    - tailscale     # accesso remoto VPN mesh
    - n8n           # n8n self-hosted
    - telegram      # configura bot Telegram per HERMES

  post_tasks:
    - name: Verifica HERMES operativo
      command: hermes --version
      register: hermes_version
      become: false

    - name: Output finale
      debug:
        msg: |
          ╔═══════════════════════════════════╗
          ║   ✅ METODO ORBIT — Operativo!    ║
          ║                                   ║
          ║   HERMES: {{ hermes_version.stdout }}
          ║                                   ║
          ║   Prossimo passo:                 ║
          ║   Apri Telegram → @OrbitBot       ║
          ║   Scrivi: ciao                    ║
          ╚═══════════════════════════════════╝
