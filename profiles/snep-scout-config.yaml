model:
  default: openrouter/owl-alpha
  provider: openrouter

mcp_servers:
  - n8n-mcp
  - brevo-mcp

tools:
  web_search:
    enabled: true
  file_read:
    enabled: true
  file_write:
    enabled: true
  code_execution:
    enabled: false
  delegation:
    enabled: false

